# Rustfmt configuration — stable rustfmt only (toolchain pinned via flake.nix)
# Unstable/nightly-only options are intentionally omitted so `cargo fmt --all -- --check`
# runs without unstable-option warnings under the pinned stable toolchain.

edition = "2024"

# Formatting options
max_width = 100
tab_spaces = 4
newline_style = "Unix"

# Import organization
reorder_imports = true
reorder_modules = true
