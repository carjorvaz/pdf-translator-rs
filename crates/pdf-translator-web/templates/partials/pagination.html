{# Pagination controls - prev/next buttons and page input #}
{# URLs use 1-based page numbers for better UX (page 1 = first page) #}
{# Prev/next use replace-url to avoid bloating history; input uses push-url for deliberate jumps #}
<div id="pagination"{% if is_oob %} hx-swap-oob="true"{% endif %} class="pagination" role="navigation" aria-label="Page navigation">
    <button type="button" id="previous-page-btn" class="btn btn-secondary"
            hx-get="/api/page-view/{{ session_id }}/{{ self.prev_page() + 1 }}?mode={{ view_mode }}"
            hx-target="#viewer"
            hx-swap="outerHTML"
            hx-sync="#app:replace"
            hx-replace-url="/view/{{ session_id }}/{{ self.prev_page() + 1 }}?mode={{ view_mode }}"
            aria-label="Previous page"
            {% if page == 0 %}disabled aria-disabled="true"{% endif %}>←</button>
    <input type="number" id="page-input" name="page" class="page-input"
           min="1" max="{{ page_count }}" value="{{ page + 1 }}"
           required inputmode="numeric" autocomplete="off"
           aria-label="Page number"
           hx-get="/api/page-view/{{ session_id }}"
           hx-trigger="keyup[key=='Enter']"
           hx-target="#viewer"
           hx-validate="true"
           hx-swap="outerHTML"
           hx-sync="#app:replace"
           hx-push-url="true"
           hx-include="this"
           hx-vals='{"mode":"{{ view_mode }}"}'>
    <span>/ {{ page_count }}</span>
    <button type="button" id="next-page-btn" class="btn btn-secondary"
            hx-get="/api/page-view/{{ session_id }}/{{ self.next_page() + 1 }}?mode={{ view_mode }}"
            hx-target="#viewer"
            hx-swap="outerHTML"
            hx-sync="#app:replace"
            hx-replace-url="/view/{{ session_id }}/{{ self.next_page() + 1 }}?mode={{ view_mode }}"
            aria-label="Next page"
            {% if page >= page_count - 1 %}disabled aria-disabled="true"{% endif %}>→</button>
</div>
