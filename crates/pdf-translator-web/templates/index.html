{% extends "base.html" %}

{% block content %}
<div class="upload-container">
    {# Graceful degradation: action/method work without JS, htmx enhances with AJAX #}
    <form class="upload-area" action="/api/upload" method="POST" enctype="multipart/form-data"
          hx-post="/api/upload" hx-encoding="multipart/form-data"
          hx-disabled-elt="#file-input">
        <label for="file-input" class="upload-label">
            <div class="upload-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="12" y1="18" x2="12" y2="12"></line>
                    <line x1="9" y1="15" x2="12" y2="12"></line>
                    <line x1="15" y1="15" x2="12" y2="12"></line>
                </svg>
            </div>
            <h2>Upload PDF to Translate</h2>
            <p>Drag and drop or click to select a PDF file</p>
        </label>
        <div class="upload-progress">
            <div id="upload-progress-bar" class="upload-progress-bar" role="progressbar"
                 aria-label="PDF upload progress" aria-valuemin="0" aria-valuemax="100"
                 aria-valuenow="0" aria-valuetext="Waiting to upload">
                <div id="upload-progress-fill" class="upload-progress-fill"></div>
            </div>
            <span id="upload-progress-text" class="upload-progress-text" role="status"
                  aria-live="polite" aria-atomic="true">0% uploaded</span>
        </div>
        <p id="upload-error" class="upload-progress-text" role="status"
           aria-live="polite" aria-atomic="true" hidden></p>
        <input type="file" name="file" id="file-input" class="file-input-hidden" accept=".pdf,application/pdf" required aria-label="PDF file to translate">
        <noscript><button type="submit" class="btn btn-primary">Upload PDF</button></noscript>
    </form>
</div>
{% endblock %}
