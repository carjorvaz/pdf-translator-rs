{# Out-of-Band swap for download button #}
{% if has_any_translations %}
<a id="download-btn" hx-swap-oob="true" href="/api/download/{{ session_id }}" hx-boost="false" class="btn btn-success btn-action">Download</a>
{% else %}
<span id="download-btn" hx-swap-oob="true" class="btn btn-success btn-action disabled" aria-disabled="true">Download</span>
{% endif %}
